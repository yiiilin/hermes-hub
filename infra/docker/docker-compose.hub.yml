# Hermes Hub 部署版 Compose。
#
# 使用方式：
#   1. 在项目根目录创建 .env，并填入下面标记为必填的变量。
#   2. docker compose --project-directory . --env-file .env -f infra/docker/docker-compose.hub.yml up -d --build
#
# 重要安全边界：
#   backend 同时托管 API 和前端静态资源，并挂载宿主机 Docker socket
#   用来创建每个用户独立的 Hermes 容器。Docker socket 是高权限边界。

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes_hub}
      POSTGRES_USER: ${POSTGRES_USER:-hermes_hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - hermes-hub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes_hub} -d ${POSTGRES_DB:-hermes_hub}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    image: ${HERMES_HUB_BACKEND_IMAGE:-hermes-hub-backend:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HERMES_HUB_BIND_ADDR: 0.0.0.0:8080
      HERMES_HUB_COOKIE_NAME: ${HERMES_HUB_COOKIE_NAME:-hermes_hub_session}
      HERMES_HUB_STATIC_DIR: /app/public
      DATABASE_URL: postgres://${POSTGRES_USER:-hermes_hub}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hermes_hub}
      HERMES_HUB_SECRET_MASTER_KEY: ${HERMES_HUB_SECRET_MASTER_KEY:?set HERMES_HUB_SECRET_MASTER_KEY}

      # 管理员可以在 UI 中更新模型配置；这里是首次启动时的默认配置。
      HERMES_HUB_MODEL_PROVIDER_NAME: ${HERMES_HUB_MODEL_PROVIDER_NAME:-openai-compatible}
      HERMES_HUB_MODEL_PROVIDER_BASE_URL: ${HERMES_HUB_MODEL_PROVIDER_BASE_URL:?set HERMES_HUB_MODEL_PROVIDER_BASE_URL}
      HERMES_HUB_MODEL_PROVIDER_API_KEY: ${HERMES_HUB_MODEL_PROVIDER_API_KEY:?set HERMES_HUB_MODEL_PROVIDER_API_KEY}
      HERMES_HUB_DEFAULT_MODEL: ${HERMES_HUB_DEFAULT_MODEL:?set HERMES_HUB_DEFAULT_MODEL}
      HERMES_HUB_ALLOWED_MODELS: ${HERMES_HUB_ALLOWED_MODELS:?set HERMES_HUB_ALLOWED_MODELS}
      HERMES_HUB_MODEL_ALLOW_STREAMING: ${HERMES_HUB_MODEL_ALLOW_STREAMING:-true}
      HERMES_HUB_MODEL_REQUEST_TIMEOUT_SECONDS: ${HERMES_HUB_MODEL_REQUEST_TIMEOUT_SECONDS:-60}

      # backend 通过宿主机 Docker daemon 创建兄弟 Hermes 容器；
      # 这里必须使用宿主机绝对路径，才能让 Docker bind mount 找到真实目录。
      HERMES_DATA_ROOT: ${PWD}/data/hub/users
      HERMES_DOCKER_IMAGE: ${HERMES_DOCKER_IMAGE:-nousresearch/hermes-agent:latest}
      HERMES_CONTAINER_NETWORK: ${HERMES_CONTAINER_NETWORK:-hermes-hub-net}
      HERMES_CONTAINER_INTERNAL_PORT: ${HERMES_CONTAINER_INTERNAL_PORT:-8000}
      HERMES_HUB_LLM_BASE_URL: ${HERMES_HUB_LLM_BASE_URL:-http://hermes-hub:8080/internal/llm/v1}
      HERMES_CONTAINER_MEMORY_LIMIT: ${HERMES_CONTAINER_MEMORY_LIMIT:-1g}
      HERMES_CONTAINER_CPU_LIMIT: ${HERMES_CONTAINER_CPU_LIMIT:-1.0}
      HERMES_DOCKER_BINARY: ${HERMES_DOCKER_BINARY:-docker}
      HERMES_HUB_PROXY_TIMEOUT_SECONDS: ${HERMES_HUB_PROXY_TIMEOUT_SECONDS:-60}
      HERMES_HUB_MAX_PROXY_BODY_BYTES: ${HERMES_HUB_MAX_PROXY_BODY_BYTES:-10485760}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/hub/users:${PWD}/data/hub/users
    networks:
      hermes-hub-net:
        aliases:
          - hermes-hub
    ports:
      - "${HERMES_HUB_HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

networks:
  hermes-hub-net:
    name: ${HERMES_CONTAINER_NETWORK:-hermes-hub-net}
