services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hermes_hub
      POSTGRES_USER: hermes_hub
      POSTGRES_PASSWORD: hermes_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes_hub -d hermes_hub"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
