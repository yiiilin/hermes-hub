name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build image and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Runtime image date tag
        id: runtime_tag
        run: |
          set -euo pipefail

          # Hermes wrapper 和 ASR 是运行时镜像，用类似官方 Hermes 的日期 tag 管理，避免 latest 缓存漂移。
          tag="$(date -u +v%Y.%-m.%-d).${GITHUB_RUN_NUMBER}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Hermes wrapper metadata
        id: hermes_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-hermes
          tags: |
            type=raw,value=${{ steps.runtime_tag.outputs.tag }}

      - name: ASR metadata
        id: asr_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-asr
          tags: |
            type=raw,value=${{ steps.runtime_tag.outputs.tag }}

      - name: Build and push Hub image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Hermes wrapper image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/hermes/Dockerfile
          push: true
          tags: ${{ steps.hermes_meta.outputs.tags }}
          labels: ${{ steps.hermes_meta.outputs.labels }}
          cache-from: type=gha,scope=hermes-wrapper
          cache-to: type=gha,mode=max,scope=hermes-wrapper

      - name: Build and push ASR image
        uses: docker/build-push-action@v6
        with:
          context: deploy/asr/sherpa
          file: deploy/asr/sherpa/Dockerfile
          push: true
          tags: ${{ steps.asr_meta.outputs.tags }}
          labels: ${{ steps.asr_meta.outputs.labels }}
          cache-from: type=gha,scope=asr
          cache-to: type=gha,mode=max,scope=asr

      - name: Build release notes
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          HERMES_IMAGE_TAGS: ${{ steps.hermes_meta.outputs.tags }}
          ASR_IMAGE_TAGS: ${{ steps.asr_meta.outputs.tags }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          previous_tag="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            commit_range="${previous_tag}..${RELEASE_TAG}"
            changes_title="Changes since ${previous_tag}"
          else
            commit_range="${RELEASE_TAG}"
            changes_title="Release commits"
          fi

          {
            echo "## Release"
            echo
            echo "- Tag: ${RELEASE_TAG}"
            echo "- Commit: ${RELEASE_SHA}"
            echo
            echo "## Container image"
            echo
            echo "Hub:"
            echo
            echo '```text'
            echo "${IMAGE_TAGS}"
            echo '```'
            echo
            echo "Hermes wrapper:"
            echo
            echo '```text'
            echo "${HERMES_IMAGE_TAGS}"
            echo '```'
            echo
            echo "ASR:"
            echo
            echo '```text'
            echo "${ASR_IMAGE_TAGS}"
            echo '```'
            echo
            echo "## ${changes_title}"
            echo
            git log --no-merges --pretty=format:'- %s (%h)' "${commit_range}"
            echo
          } > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --verify-tag
          fi
