name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build image and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Runtime image date tag
        id: runtime_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Hermes wrapper 和 ASR 是运行时镜像，用类似官方 Hermes 的日期 tag 管理。
          # 当天第一次发版不加序号；第二次起追加当天发版次数，例如 v2026.6.4.2。
          date_tag="$(date -u +v%Y.%-m.%-d)"
          date_iso="$(date -u +%Y-%m-%d)"
          previous_releases_today="$(
            DATE_ISO="${date_iso}" RELEASE_TAG="${RELEASE_TAG}" \
              gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" \
                --jq '.[] | select(.draft == false) | select(.tag_name != env.RELEASE_TAG) | select(.published_at | startswith(env.DATE_ISO)) | .tag_name' \
              | wc -l \
              | tr -d ' '
          )"
          release_index=$((previous_releases_today + 1))
          if [ "${release_index}" -eq 1 ]; then
            tag="${date_tag}"
          else
            tag="${date_tag}.${release_index}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Detect image changes
        id: image_changes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          previous_tag="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)"
          echo "previous_tag=${previous_tag}" >> "${GITHUB_OUTPUT}"

          if [ -z "${previous_tag}" ]; then
            {
              echo "hub=true"
              echo "hermes=true"
              echo "asr=true"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          changed_files="$(git diff --name-only "${previous_tag}" "${RELEASE_TAG}")"
          {
            echo "changed_files<<EOF"
            echo "${changed_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          hub=false
          hermes=false
          asr=false

          while IFS= read -r path; do
            [ -n "${path}" ] || continue

            # Hub 镜像只看会进入最终镜像或影响构建产物的输入，测试文件变更不触发发布镜像。
            case "${path}" in
              Cargo.toml|Cargo.lock|backend/Cargo.toml|backend/build.rs|\
              backend/src/*|backend/migrations/*|\
              frontend/index.html|frontend/package.json|frontend/package-lock.json|\
              frontend/public/*|frontend/src/*|frontend/tsconfig*.json|frontend/vite.config.*|\
              docker/backend/*|.dockerignore)
                hub=true
                ;;
            esac

            # Hermes wrapper 镜像只依赖 wrapper Dockerfile、入口脚本和内置插件。
            case "${path}" in
              docker/hermes/*|.dockerignore)
                hermes=true
                ;;
            esac

            # ASR 镜像使用独立 context，只看 sherpa 目录下的构建输入。
            case "${path}" in
              deploy/asr/sherpa/*)
                asr=true
                ;;
            esac
          done <<< "${changed_files}"

          {
            echo "hub=${hub}"
            echo "hermes=${hermes}"
            echo "asr=${asr}"
          } >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Hermes wrapper metadata
        id: hermes_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-hermes
          tags: |
            type=raw,value=${{ steps.runtime_tag.outputs.tag }}

      - name: ASR metadata
        id: asr_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-asr
          tags: |
            type=raw,value=${{ steps.runtime_tag.outputs.tag }}

      - name: Build and push Hub image
        if: steps.image_changes.outputs.hub == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Hermes wrapper image
        if: steps.image_changes.outputs.hermes == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/hermes/Dockerfile
          push: true
          tags: ${{ steps.hermes_meta.outputs.tags }}
          labels: ${{ steps.hermes_meta.outputs.labels }}
          cache-from: type=gha,scope=hermes-wrapper
          cache-to: type=gha,mode=max,scope=hermes-wrapper

      - name: Build and push ASR image
        if: steps.image_changes.outputs.asr == 'true'
        uses: docker/build-push-action@v6
        with:
          context: deploy/asr/sherpa
          file: deploy/asr/sherpa/Dockerfile
          push: true
          tags: ${{ steps.asr_meta.outputs.tags }}
          labels: ${{ steps.asr_meta.outputs.labels }}
          cache-from: type=gha,scope=asr
          cache-to: type=gha,mode=max,scope=asr

      - name: Build release notes
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          HERMES_IMAGE_TAGS: ${{ steps.hermes_meta.outputs.tags }}
          ASR_IMAGE_TAGS: ${{ steps.asr_meta.outputs.tags }}
          HUB_IMAGE_BUILT: ${{ steps.image_changes.outputs.hub }}
          HERMES_IMAGE_BUILT: ${{ steps.image_changes.outputs.hermes }}
          ASR_IMAGE_BUILT: ${{ steps.image_changes.outputs.asr }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          previous_tag="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            commit_range="${previous_tag}..${RELEASE_TAG}"
            changes_title="Changes since ${previous_tag}"
          else
            commit_range="${RELEASE_TAG}"
            changes_title="Release commits"
          fi

          release_content=""
          if [ "$(git cat-file -t "${RELEASE_TAG}" 2>/dev/null || true)" = "tag" ]; then
            # 本地发版脚本会创建 annotated tag；tag message 就是人工填写的发版内容。
            release_content="$(git for-each-ref "refs/tags/${RELEASE_TAG}" --format='%(contents)')"
          fi

          {
            echo "## Release"
            echo
            echo "- Tag: ${RELEASE_TAG}"
            echo "- Commit: ${RELEASE_SHA}"
            echo
            if [ -n "${release_content}" ]; then
              echo "## Release notes"
              echo
              printf '%s\n' "${release_content}"
              echo
            fi
            echo
            echo "## Container image"
            echo
            echo "Hub:"
            echo
            if [ "${HUB_IMAGE_BUILT}" = "true" ]; then
              echo "Built and pushed:"
              echo
              echo '```text'
              echo "${IMAGE_TAGS}"
              echo '```'
            else
              echo "Skipped: no Hub image input changed since ${previous_tag}; reuse the existing registry image."
            fi
            echo
            echo "Hermes wrapper:"
            echo
            if [ "${HERMES_IMAGE_BUILT}" = "true" ]; then
              echo "Built and pushed:"
              echo
              echo '```text'
              echo "${HERMES_IMAGE_TAGS}"
              echo '```'
            else
              echo "Skipped: no Hermes wrapper image input changed since ${previous_tag}; reuse the existing registry image."
            fi
            echo
            echo "ASR:"
            echo
            if [ "${ASR_IMAGE_BUILT}" = "true" ]; then
              echo "Built and pushed:"
              echo
              echo '```text'
              echo "${ASR_IMAGE_TAGS}"
              echo '```'
            else
              echo "Skipped: no ASR image input changed since ${previous_tag}; reuse the existing registry image."
            fi
            echo
            echo "## ${changes_title}"
            echo
            git log --no-merges --pretty=format:'- %s (%h)' "${commit_range}"
            echo
          } > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --verify-tag
          fi
