name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: docker compose -f infra/docker/docker-compose.yml config
      - name: Check README MVP boundary wording
        run: |
          grep -q "PostgreSQL/SQLx-backed runtime store" README.md
          grep -q "Docker CLI based Hermes provisioner" README.md
          grep -q "Verification Boundary" README.md

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hermes_hub
          POSTGRES_USER: hermes_hub
          POSTGRES_PASSWORD: hermes_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hermes_hub -d hermes_hub"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test backend
        run: cargo test --workspace
      - name: Test PostgreSQL persistence
        env:
          HERMES_HUB_TEST_DATABASE_URL: postgres://hermes_hub:hermes_hub@127.0.0.1:5432/hermes_hub
        run: cargo test -p hermes-hub-backend --test postgres_persistence_test -- --nocapture

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm run build
      - run: npm run test:e2e
